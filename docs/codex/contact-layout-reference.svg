<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1040" viewBox="0 0 1700 1040" role="img" aria-labelledby="title desc">
  <title id="title">Contact section layout reference</title>
  <desc id="desc">A dark minimal contact page mockup with a large centered headline and a compact contact card without phone number.</desc>
  <defs>
    <radialGradient id="blueWash" cx="10%" cy="76%" r="48%">
      <stop offset="0%" stop-color="#0C4A5B" stop-opacity="0.34"/>
      <stop offset="58%" stop-color="#0C4A5B" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0C4A5B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenBlue" cx="82%" cy="26%" r="44%">
      <stop offset="0%" stop-color="#8EC5FF" stop-opacity="0.14"/>
      <stop offset="58%" stop-color="#8EC5FF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#8EC5FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="purpleWash" cx="82%" cy="88%" r="42%">
      <stop offset="0%" stop-color="#3B1434" stop-opacity="0.34"/>
      <stop offset="62%" stop-color="#3B1434" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3B1434" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#151D24"/>
      <stop offset="100%" stop-color="#0A0F15"/>
    </linearGradient>
    <linearGradient id="button" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B8DEFF"/>
      <stop offset="100%" stop-color="#78B8F4"/>
    </linearGradient>
    <filter id="panelShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .bg { fill: #05070A; }
      .text { fill: #F3F7FA; font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif; }
      .muted { fill: #9AA7B3; font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif; }
      .blue { fill: #8EC5FF; }
      .ink { fill: #061018; font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif; }
      .label { font-size: 14px; font-weight: 780; letter-spacing: 1px; text-transform: uppercase; }
      .hero { font-size: 92px; font-weight: 880; letter-spacing: 0; }
      .cn { font-size: 24px; font-weight: 520; }
      .cardText { font-size: 18px; font-weight: 560; }
      .small { font-size: 13px; font-weight: 650; }
      .line { stroke: rgba(180, 200, 220, 0.16); stroke-width: 1; }
      .panel { fill: url(#panel); stroke: rgba(180, 200, 220, 0.18); stroke-width: 1.2; filter: url(#panelShadow); }
      .ghost { fill: #F3F7FA; opacity: 0.018; font-size: 230px; font-weight: 900; letter-spacing: 0; }
    </style>
  </defs>

  <rect class="bg" width="1700" height="1040"/>
  <rect width="1700" height="1040" fill="url(#blueWash)"/>
  <rect width="1700" height="1040" fill="url(#greenBlue)"/>
  <rect width="1700" height="1040" fill="url(#purpleWash)"/>
  <text class="ghost" x="84" y="994">CONTACT</text>

  <g transform="translate(82 56)">
    <rect x="0" y="0" width="1536" height="64" rx="32" fill="rgba(11,17,24,0.66)" stroke="rgba(180,200,220,0.16)"/>
    <rect x="24" y="12" width="210" height="40" rx="20" fill="rgba(243,247,250,0.06)" stroke="rgba(243,247,250,0.14)"/>
    <text class="text" x="46" y="38" font-size="16" font-weight="760">Jack Wang</text>
    <line x1="134" y1="20" x2="134" y2="44" stroke="rgba(243,247,250,0.22)"/>
    <text class="muted label" x="154" y="38" font-size="12">Portfolio</text>
    <text class="text" x="720" y="37" font-size="14" font-weight="700">Profile</text>
    <text class="text" x="856" y="37" font-size="14" font-weight="700">Works</text>
    <text class="text" x="988" y="37" font-size="14" font-weight="700">Strengths</text>
    <rect x="1424" y="12" width="88" height="40" rx="20" fill="rgba(243,247,250,0.08)" stroke="rgba(243,247,250,0.24)"/>
    <text class="text" x="1448" y="37" font-size="14" font-weight="700">联系我</text>
  </g>

  <g transform="translate(90 300)">
    <text class="muted cn" x="0" y="0">联系方式</text>
    <text class="text hero" x="0" y="92">LET'S BUILD</text>
    <text class="text hero" x="0" y="186">CONTENT</text>
    <text class="text hero" x="0" y="280">THAT TRAVELS</text>
    <text class="blue" x="760" y="278" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="760">↘</text>
    <rect x="0" y="338" width="214" height="46" rx="23" fill="url(#button)"/>
    <text class="ink" x="38" y="368" font-size="15" font-weight="820">Back to Hero</text>
  </g>

  <g transform="translate(1140 270)">
    <rect class="panel" x="0" y="0" width="390" height="574" rx="20"/>
    <text class="blue label" x="36" y="58">Contact</text>
    <g transform="translate(36 94)">
      <text class="muted small" x="0" y="0">邮箱</text>
      <text class="text cardText" x="86" y="0">zj2020dq@163.com</text>
      <line class="line" x1="0" y1="26" x2="318" y2="26"/>
      <text class="muted small" x="0" y="58">微信</text>
      <text class="text cardText" x="86" y="58">Dsir2024</text>
      <line class="line" x1="0" y1="84" x2="318" y2="84"/>
      <text class="blue label" x="0" y="128">Douyin QR</text>
      <image href="douyin-qr-blue-solid.png" x="68" y="150" width="186" height="186" preserveAspectRatio="xMidYMid meet"/>
      <text class="muted small" x="90" y="360">扫码查看短视频作品</text>
      <line class="line" x1="0" y1="388" x2="318" y2="388"/>
    </g>
    <g transform="translate(36 456)">
      <rect x="0" y="0" width="150" height="52" rx="26" fill="url(#button)"/>
      <text class="ink" x="31" y="33" font-size="15" font-weight="820">发邮件</text>
      <rect x="168" y="0" width="150" height="52" rx="26" fill="rgba(243,247,250,0.08)" stroke="rgba(180,200,220,0.18)"/>
      <text class="text" x="199" y="33" font-size="15" font-weight="780">打开抖音</text>
    </g>
  </g>
</svg>
