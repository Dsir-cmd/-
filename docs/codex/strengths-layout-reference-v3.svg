<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1040" viewBox="0 0 1700 1040" role="img" aria-labelledby="title desc">
  <title id="title">Strengths section layout reference v3</title>
  <desc id="desc">A spacious dark Core Strengths layout with quiet cards, minimal text, abstract glass-like symbols, and a concise Chinese subtitle.</desc>
  <defs>
    <radialGradient id="ambientA" cx="12%" cy="18%" r="52%">
      <stop offset="0%" stop-color="#0C4A5B" stop-opacity="0.36"/>
      <stop offset="58%" stop-color="#0C4A5B" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0C4A5B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ambientB" cx="90%" cy="84%" r="52%">
      <stop offset="0%" stop-color="#3B1434" stop-opacity="0.38"/>
      <stop offset="62%" stop-color="#3B1434" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3B1434" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="darkCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#121920"/>
      <stop offset="100%" stop-color="#080C11"/>
    </linearGradient>
    <linearGradient id="deepCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101820"/>
      <stop offset="60%" stop-color="#090E14"/>
      <stop offset="100%" stop-color="#070A0F"/>
    </linearGradient>
    <linearGradient id="accentCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A9D8FF"/>
      <stop offset="100%" stop-color="#6DAFEF"/>
    </linearGradient>
    <linearGradient id="glassBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D8F0FF" stop-opacity="0.84"/>
      <stop offset="42%" stop-color="#8EC5FF" stop-opacity="0.48"/>
      <stop offset="100%" stop-color="#4F41A6" stop-opacity="0.58"/>
    </linearGradient>
    <linearGradient id="glassLime" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D8FF74" stop-opacity="0.82"/>
      <stop offset="52%" stop-color="#8EC5FF" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#6B5BD6" stop-opacity="0.62"/>
    </linearGradient>
    <linearGradient id="glassSilver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.74"/>
      <stop offset="46%" stop-color="#A8B6C4" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#8EC5FF" stop-opacity="0.28"/>
    </linearGradient>
    <filter id="blurGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="softBlur" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <style>
      .bg { fill: #05070A; }
      .text { fill: #F3F7FA; font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif; }
      .muted { fill: #9AA7B3; font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif; }
      .blue { fill: #8EC5FF; }
      .darkInk { fill: #061018; font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif; }
      .card { stroke: rgba(180, 200, 220, 0.16); stroke-width: 1.2; }
      .accentStroke { stroke: rgba(142, 197, 255, 0.42); stroke-width: 1.2; }
      .label { font-size: 13px; font-weight: 760; letter-spacing: 1px; text-transform: uppercase; }
      .h1 { font-size: 88px; font-weight: 880; letter-spacing: 0; }
      .cnTitle { font-size: 30px; font-weight: 520; }
      .cardTitle { font-size: 39px; font-weight: 640; letter-spacing: 0; }
      .cardTitleSmall { font-size: 34px; font-weight: 640; letter-spacing: 0; }
      .pillText { font-size: 13px; font-weight: 800; }
      .ghost { fill: #F3F7FA; opacity: 0.018; font-size: 248px; font-weight: 900; letter-spacing: 0; }
    </style>
  </defs>

  <rect class="bg" width="1700" height="1040"/>
  <rect width="1700" height="1040" fill="url(#ambientA)"/>
  <rect width="1700" height="1040" fill="url(#ambientB)"/>
  <text class="ghost" x="52" y="1000">STRENGTHS</text>

  <g transform="translate(82 76)">
    <text class="text h1" x="0" y="0" dominant-baseline="hanging">CORE STRENGTHS</text>
    <text class="muted cnTitle" x="0" y="104">个人优势</text>
    <text class="blue" x="512" y="70" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="720">↘</text>
  </g>

  <g transform="translate(82 238)">
    <rect class="card" x="0" y="0" width="720" height="382" rx="16" fill="url(#deepCard)"/>
    <rect x="34" y="34" width="58" height="30" rx="15" fill="rgba(142,197,255,0.10)" stroke="rgba(142,197,255,0.24)"/>
    <text class="blue pillText" x="54" y="54">01</text>
    <text class="muted label" x="632" y="56">CORE</text>
    <text class="text cardTitle" x="34" y="154">内容策略主导力</text>
    <circle cx="336" cy="156" r="5" fill="#8EC5FF"/>
    <circle cx="602" cy="254" r="92" fill="#8EC5FF" opacity="0.12" filter="url(#blurGlow)"/>
    <path d="M520 238 C566 188 644 196 664 258 C682 314 628 354 576 326 C532 302 492 270 520 238Z" fill="url(#glassLime)" opacity="0.8"/>
    <path d="M552 282 C594 270 620 242 628 204 C638 250 666 276 708 286 C662 296 636 324 624 366 C614 322 590 294 552 282Z" fill="#EAF8FF" opacity="0.72" filter="url(#softBlur)"/>
    <path d="M552 282 C594 270 620 242 628 204 C638 250 666 276 708 286 C662 296 636 324 624 366 C614 322 590 294 552 282Z" fill="none" stroke="#F3F7FA" stroke-opacity="0.48" stroke-width="4"/>

    <rect class="card" x="758" y="0" width="760" height="382" rx="16" fill="url(#darkCard)"/>
    <rect x="792" y="34" width="58" height="30" rx="15" fill="rgba(142,197,255,0.10)" stroke="rgba(142,197,255,0.24)"/>
    <text class="blue pillText" x="812" y="54">02</text>
    <text class="muted label" x="1426" y="56">CORE</text>
    <text class="text cardTitle" x="792" y="154">摄影视觉表达</text>
    <circle cx="1078" cy="156" r="5" fill="#8EC5FF"/>
    <ellipse cx="1336" cy="258" rx="88" ry="48" fill="url(#glassBlue)" opacity="0.72" transform="rotate(-34 1336 258)"/>
    <ellipse cx="1406" cy="226" rx="66" ry="38" fill="url(#glassLime)" opacity="0.64" transform="rotate(-54 1406 226)"/>
    <ellipse cx="1468" cy="256" rx="50" ry="34" fill="url(#glassSilver)" opacity="0.56" transform="rotate(-18 1468 256)"/>
    <ellipse cx="1420" cy="318" rx="76" ry="34" fill="url(#glassSilver)" opacity="0.54" transform="rotate(-10 1420 318)"/>
  </g>

  <g transform="translate(82 650)">
    <rect class="card" x="0" y="0" width="486" height="286" rx="16" fill="url(#deepCard)"/>
    <rect x="32" y="32" width="54" height="28" rx="14" fill="rgba(142,197,255,0.10)" stroke="rgba(142,197,255,0.22)"/>
    <text class="blue pillText" x="50" y="51">03</text>
    <text class="muted label" x="382" y="51">SYSTEM</text>
    <text class="text cardTitleSmall" x="32" y="138">AI 与数据提效</text>
    <circle cx="284" cy="138" r="5" fill="#8EC5FF"/>
    <path d="M300 216 C342 174 406 172 434 218 C396 248 346 256 300 216Z" fill="url(#glassLime)" opacity="0.64"/>
    <circle cx="430" cy="194" r="28" fill="url(#glassSilver)" opacity="0.65"/>
    <path d="M342 188 C376 228 430 236 468 204" fill="none" stroke="#8EC5FF" stroke-opacity="0.34" stroke-width="16" stroke-linecap="round"/>

    <rect class="card" x="518" y="0" width="486" height="286" rx="16" fill="url(#darkCard)"/>
    <rect x="550" y="32" width="54" height="28" rx="14" fill="rgba(142,197,255,0.10)" stroke="rgba(142,197,255,0.22)"/>
    <text class="blue pillText" x="568" y="51">04</text>
    <text class="muted label" x="900" y="51">SYSTEM</text>
    <text class="text cardTitleSmall" x="550" y="138">市场运营统筹</text>
    <circle cx="828" cy="138" r="5" fill="#8EC5FF"/>
    <path d="M816 206 L902 162 L988 206 L902 250Z" fill="url(#glassSilver)" opacity="0.7"/>
    <path d="M816 206 L902 250 L902 286 L816 242Z" fill="#5A52CE" opacity="0.62"/>
    <path d="M902 250 L988 206 L988 242 L902 286Z" fill="#8EC5FF" opacity="0.26"/>
    <rect x="846" y="178" width="92" height="70" rx="8" fill="#C2EA70" opacity="0.55"/>

    <rect x="1038" y="0" width="480" height="286" rx="16" fill="url(#accentCard)" stroke="rgba(243,247,250,0.20)" stroke-width="1.2"/>
    <rect x="1070" y="32" width="54" height="28" rx="14" fill="rgba(6,16,24,0.10)" stroke="rgba(6,16,24,0.16)"/>
    <text class="darkInk pillText" x="1088" y="51">05</text>
    <text class="darkInk label" x="1412" y="51" opacity="0.72">SYSTEM</text>
    <text class="darkInk cardTitleSmall" x="1070" y="132">跨角色协同</text>
    <circle cx="1306" cy="132" r="5" fill="#061018"/>
    <g transform="rotate(-6 1282 198)">
      <rect x="1150" y="170" width="270" height="56" rx="28" fill="rgba(243,247,250,0.92)"/>
      <text class="darkInk" x="1204" y="205" font-size="18" font-weight="760">连接内容与运营</text>
    </g>
    <g transform="rotate(-7 1282 248)">
      <rect x="1110" y="238" width="250" height="54" rx="27" fill="#061018"/>
      <text class="text" x="1160" y="272" font-size="17" font-weight="760">把想法变成执行</text>
    </g>
  </g>
</svg>
